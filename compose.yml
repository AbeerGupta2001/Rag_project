

volumes:
  qdrant_storage:

services:
  app:
    build: .
    ports:
      - 8501:8501
    depends_on:
      - qdrant
  

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage
